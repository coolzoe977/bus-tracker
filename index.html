// ==================== 狀態管理 ====================
const state = {
  actualDay: new Date().getDay(),
  simulatedDay: null,
  direction: 'go',
  wedPlan: 'return_A',
  activeStepId: null,
  activeBus: null,
  apiData: null,
  isLoading: false,
  apiError: '',
  currentDayStr: ''
};

function getEffectiveDay() { return state.simulatedDay !== null ? state.simulatedDay : state.actualDay; }
function isRestDay(d) { return d === 0 || d === 1 || d === 2; }

// ==================== API 呼叫 ====================
async function fetchBusData(busConfig, targetStop) {
  if (!busConfig || !targetStop) return;
  state.isLoading = true;
  state.apiError = '';
  state.apiData = null;
  render();

  try {
    const url = `${WORKER_URL}?route=${encodeURIComponent(busConfig.route)}&stop=${encodeURIComponent(targetStop)}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`伺服器錯誤 (HTTP ${res.status})`);
    const raw = await res.json();
    if (!Array.isArray(raw)) throw new Error(raw.error || '回傳格式錯誤');

    let data = raw;
    if (busConfig.dir !== undefined) data = raw.filter(i => i.Direction === busConfig.dir);

    const buses = data.map(item => {
      let text = '', min = null;
      if      (item.StopStatus === 1) text = '尚未發車';
      else if (item.StopStatus === 2) text = '交管不停';
      else if (item.StopStatus === 3) text = '末班已過';
      else if (item.StopStatus === 4) text = '今日未營運';
      else if (item.EstimateTime !== undefined) {
        min = Math.floor(item.EstimateTime / 60);
        text = min <= 2 ? '即將進站' : `${min} 分鐘`;
      } else text = '無資料';
      return { min, text, isIncoming: min !== null && min <= 2, plate: item.PlateNumb || '---' };
    }).sort((a, b) => {
      if (a.min !== null && b.min !== null) return a.min - b.min;
      return a.min !== null ? -1 : 1;
    });

    state.apiData = {
      updateTime: new Date().toLocaleTimeString('zh-TW', {hour12:false}),
      routeName: busConfig.label,
      stopName: targetStop,
      estimates: buses.slice(0, 2)
    };
  } catch (e) {
    state.apiError = e.message;
  } finally {
    state.isLoading = false;
    render();
  }
}

function handleStepClick(step) {
  state.activeStepId = step.id;
  if (step.buses && step.buses.length > 0) {
    state.activeBus = step.buses[0];
    fetchBusData(step.buses[0], step.target);
  } else {
    state.activeBus = null;
    state.apiData = null;
    render();
  }
}

function handleBusSwitch(busConfig, target) {
  state.activeBus = busConfig;
  fetchBusData(busConfig, target);
}

function getSteps() {
  const day = getEffectiveDay();
  const sched = scheduleData[day];
  if (!sched) return [];
  if (state.direction === 'go') return sched.go;
  if (day === 3) return sched[state.wedPlan];
  return sched.return;
}

          <div class="rest-title">今天不上課，真好！</div>

        </div>

            ${[3,4,5,6].map(d=>`<button class="sim-btn" onclick="simDay(${d})">星期${dNames[d]}</button>`).join('')}
          </div>
        </div>
      </div>`;
    return;
  }

  const sched = scheduleData[day];
  const steps = getSteps();
  const activeStep = steps.find(s => s.id === state.activeStepId) || steps[0];
  const dNames = ['日','一','二','三','四','五','六'];
  const today = new Date();

  const stepsHTML = steps.map((step, idx) => {
    const isActive = state.activeStepId === step.id || (!state.activeStepId && idx === 0);
    const isLast = idx === steps.length - 1;
    return `
      <div class="step-item${isActive?' active':''}" onclick="clickStep(${idx})">
        ${!isLast ? `<div class="step-connector${isActive?' active':''}"></div>` : ''}
        <div class="step-num">${idx+1}</div>
        <div>
          <div class="step-time">${step.time}</div>
          <div class="step-text">${step.text}</div>
        </div>
      </div>`;
  }).join('');

  let rightHTML = '';
  if (!activeStep || !activeStep.buses || activeStep.buses.length === 0) {
    rightHTML = `
      <div class="protect-card">
        <div class="protect-icon">⚠️</div>
        <div class="protect-title">啟動保護模式</div>
        <div class="protect-msg">${activeStep?.hint || '這個時段太晚了，別折騰公車了！'}</div>
        <button class="protect-btn" onclick="alert('叫車軟體開起來！平安到家！')">📱 打開叫車軟體</button>
      </div>`;
  } else {
    const routeBtnsHTML = activeStep.buses.length > 1
      ? `<div class="route-btns">${activeStep.buses.map((b,i)=>`<button class="route-btn${state.activeBus?.label===b.label?' active':''}" onclick="switchBus(${i})">${b.label}</button>`).join('')}</div>`
      : '';

    let bodyHTML = '';
    if (state.isLoading) {
      bodyHTML = `<div class="loading"><div class="loading-icon">🔄</div><div>抓取即時資訊中...</div></div>`;
    } else if (state.apiError) {
      bodyHTML = `<div class="error-msg">❌ ${state.apiError}</div>`;
    } else if (state.apiData) {
      const e = state.apiData.estimates;
      const firstHTML = e.length > 0 ? `
        <div class="bus-first${e[0].isIncoming?' incoming':''}">
          ${e[0].isIncoming ? '<div class="incoming-badge">即將進站</div>' : ''}
          <div class="bus-sublabel">最近一班車</div>
          <div class="bus-time">${e[0].text}</div>
          <div class="bus-plate">🚌 車牌：${e[0].plate}</div>
        </div>` : '';
      const secondHTML = e.length > 1 ? `
        <div class="bus-second">
          <div class="bus-second-icon">🕐</div>
          <div>
            <div class="bus-second-label">下一班車</div>
            <div class="bus-second-time">${e[1].text}</div>
          </div>
        </div>` : '';
      const noDataHTML = e.length === 0 ? `<div class="no-data">目前無發車資訊</div>` : '';

      bodyHTML = `
        <div style="text-align:center">
          <div class="stop-label">📍 妳正在看的站牌</div>
          <div class="stop-name">${state.apiData.stopName}</div>
          <div class="route-name">${state.apiData.routeName}</div>
        </div>
        <div class="bus-main">
          ${firstHTML}${secondHTML}${noDataHTML}
        </div>
        <div class="update-bar">
          <span class="update-time">🕐 ${state.apiData.updateTime}</span>
          <button class="refresh-btn" onclick="refreshData()">🔄 重整</button>
        </div>`;
    }

    rightHTML = `
      <div class="bus-card">
        <div class="bus-card-top">
          <div class="bus-hint-label">⚡ G哥重點提示</div>
          <div class="bus-hint">${activeStep.hint || '準備搭車囉！'}</div>
          ${routeBtnsHTML}
        </div>
        <div class="bus-card-body">${bodyHTML}</div>
      </div>`;
  }

  const wedBarHTML = day === 3 && state.direction === 'return' ? `
    <div class="wed-bar">
      <button class="wed-btn${state.wedPlan==='return_A'?' active':''}" onclick="setWedPlan('return_A')">提早放人 (衝刺版)</button>
      <button class="wed-btn${state.wedPlan==='return_B'?' active':''}" onclick="setWedPlan('return_B')">晚走悠哉 (冷氣版)</button>
    </div>` : '';

  const bannerHTML = state.simulatedDay !== null ? `
    <div class="test-banner">
      <span>⚠️ 測試模式：模擬 ${sched.label.split(' ')[0]}</span>
      <button class="close-btn" onclick="closeSimulation()">✕ 關閉</button>
    </div>` : '';

  app.innerHTML = `
    <header class="header">
      <div class="header-icon">🚌</div>
      <div>
        <div class="header-title">G哥智能通勤護目鏡</div>
        <div class="header-sub">
          ${state.simulatedDay !== null ? `模擬 | ${sched.label}` : `${today.toLocaleDateString()} (星期${dNames[state.actualDay]}) | ${sched.label}`}
        </div>
      </div>
      <div class="badge">⚡ Cloudflare 雲端已連線</div>
    </header>

    <div style="padding:.75rem 1rem 0">
      ${bannerHTML}
    </div>

    <div class="container">
      <div class="left-panel">
        <div class="tab-bar">
          <button class="tab-btn${state.direction==='go'?' active':''}" onclick="setDir('go')">出發去學校</button>
          <button class="tab-btn${state.direction==='return'?' active':''}" onclick="setDir('return')">下課回租屋處</button>
        </div>
        ${wedBarHTML}
        <div class="steps-card">
          <div class="steps-label">點擊目前步驟 👉</div>
          ${stepsHTML}
        </div>
      </div>
      <div class="right-panel">${rightHTML}</div>
    </div>`;
}

// ==================== 事件處理 ====================
function setDir(d) {
  state.direction = d;
  state.activeStepId = null;
  state.apiData = null;
  state.apiError = '';
  render();
  const steps = getSteps();
  if (steps.length > 0) handleStepClick(steps[0]);
}

function setWedPlan(plan) {
  state.wedPlan = plan;
  state.activeStepId = null;
  render();
  const steps = getSteps();
  if (steps.length > 0) handleStepClick(steps[0]);
}

function clickStep(idx) {
  const steps = getSteps();
  if (steps[idx]) handleStepClick(steps[idx]);
}

function switchBus(idx) {
  const steps = getSteps();
  const activeStep = steps.find(s => s.id === state.activeStepId) || steps[0];
  if (activeStep && activeStep.buses[idx]) handleBusSwitch(activeStep.buses[idx], activeStep.target);
}

function refreshData() {
  const steps = getSteps();
  const activeStep = steps.find(s => s.id === state.activeStepId) || steps[0];
  if (activeStep && state.activeBus) fetchBusData(state.activeBus, activeStep.target);
}

function simDay(d) { state.simulatedDay = d; state.activeStepId = null; state.apiData = null; render(); const steps = getSteps(); if (steps.length > 0) handleStepClick(steps[0]); }
function closeSimulation() { state.simulatedDay = null; state.activeStepId = null; state.apiData = null; render(); }

// ==================== 初始化 ====================
(function init() {
  const today = new Date();
  state.actualDay = today.getDay();
  render();
  if (!isRestDay(getEffectiveDay())) {
    const steps = getSteps();
    if (steps.length > 0) handleStepClick(steps[0]);
  }
})();
</script>
</body>
</html>
